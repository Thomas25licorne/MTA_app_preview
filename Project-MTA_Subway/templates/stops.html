<!DOCTYPE html>
<html>
<head>
    <title>Select Stop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f8f9fa; padding: 0; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        
        .header { 
            text-align: center; padding: 20px; 
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 { margin: 0; font-size: 1.5em; }

        .stop-list { list-style: none; padding: 0; margin: 0; }
        
        .stop-link {
            display: block; padding: 18px 25px; 
            border-bottom: 1px solid #eee;
            text-decoration: none; color: #333; font-size: 1.1em;
            transition: background 0.1s;
        }
        .stop-link:hover { background: #f1f3f5; padding-left: 30px; } /* Slight slide effect */
        
        .back-btn { display: block; text-align: center; padding: 20px; color: #888; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header" style="background-color: #{{ color }}; color: #{{ text_color }};">
            <h2>Select Stop</h2>
        </div>
        
        <div class="stop-list">
            {% for s in stops %}
            <a href="{{ url_for('live_board', route_id=route_id, direction_id=direction_id, stop_id=s.id) }}" class="stop-link">
                {{ s.name }}
            </a>
            {% endfor %}
        </div>
        
        <a href="{{ url_for('menu_directions', route_id=route_id) }}" class="back-btn">← Back to Direction</a>
    </div>
</body>
</html>
