<!DOCTYPE html>
<html>
<head>
    <title>NYC Subway Selector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { margin-bottom: 30px; letter-spacing: 1px; }
        
        /* The Grid Layout */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); 
            gap: 15px; 
            max-width: 800px; 
            margin: 0 auto; 
        }

        /* The Train Circles */
        .route-btn {
            display: flex; justify-content: center; align-items: center;
            height: 70px; width: 70px;
            border-radius: 50%;
            font-size: 1.8em; font-weight: bold; 
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 0 auto;
        }
        .route-btn:hover { transform: scale(1.1); box-shadow: 0 6px 12px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <h1>Select a Line</h1>
    <div class="grid">
        {% for route in routes %}
        <a href="{{ url_for('menu_stations', route_id=route.id) }}" 
           class="route-btn" 
           style="background-color: #{{ route.color }}; color: #{{ route.text_color }};">
            {{ route.id }}
        </a>
        {% endfor %}
    </div>
</body>
</html>
